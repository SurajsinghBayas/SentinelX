name: sentinelx_app
description: AI-Powered Real-Time Cybersecurity Threat Detection — Mobile Client
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──────────────────────────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # ── Networking ────────────────────────────────────────────────────────
  dio: ^5.4.3+1
  pretty_dio_logger: ^1.3.1
  connectivity_plus: ^6.0.3

  # ── Local Storage ─────────────────────────────────────────────────────
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # ── Navigation ────────────────────────────────────────────────────────
  go_router: ^13.2.1

  # ── Firebase / Push Notifications ────────────────────────────────────
  firebase_core: ^2.30.1
  firebase_messaging: ^14.9.1
  flutter_local_notifications: ^17.1.2

  # ── Serialization ─────────────────────────────────────────────────────
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # ── Permissions ───────────────────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── SMS / Call / Phone ────────────────────────────────────────────────
  telephony: ^0.2.0
  phone_state: ^2.1.0

  # ── UI Utilities ─────────────────────────────────────────────────────
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  fl_chart: ^0.68.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  lottie: ^3.1.2
  gap: ^3.0.1
  intl: ^0.19.0

  # ── Misc ──────────────────────────────────────────────────────────────
  uuid: ^4.4.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  logger: ^2.3.0
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0
  shared_preferences: ^2.2.3
  flutter_svg: ^2.0.10+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
